name: cyclecore_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Cupertino
  cupertino_icons: ^1.0.8

  # --- Estado / reactividad ---
  flutter_riverpod: ^2.5.1

  # --- Mapas y geoespacial ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  geolocator_android: ^4.6.2

  # --- Sensores BLE ---
  flutter_blue_plus: ^1.32.12

  # --- Persistencia local (offline-first) ---
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # --- Voz (recomendaciones TTS) ---
  flutter_tts: ^4.0.2

  # --- Conectividad ---
  connectivity_plus: ^6.0.5

  # --- Permisos ---
  permission_handler: ^11.3.1

  # --- Sensores del dispositivo ---
  sensors_plus: ^6.0.1

  # --- Preferencias ---
  shared_preferences: ^2.3.2

  # --- Compartir ---
  share_plus: ^10.1.2

  # --- Selección de imágenes ---
  image_picker: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # --- Generación de código para Drift ---
  drift_dev: ^2.20.3
  build_runner: ^2.4.12

flutter:
  uses-material-design: true